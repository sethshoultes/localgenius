version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://localgenius:localgenius@postgres:5432/localgenius
      - JWT_SECRET=dev-jwt-secret-change-in-production-32chars
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: localgenius
      POSTGRES_PASSWORD: localgenius
      POSTGRES_DB: localgenius
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localgenius"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
