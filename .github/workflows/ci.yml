# LocalGenius CI Pipeline
#
# Runs on every push and PR:
#   1. Test (736+ specs via vitest)
#   2. Build (Next.js production build)
#
# Total target time: < 5 minutes

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          JWT_SECRET: "ci-placeholder-secret-that-is-at-least-32-characters-long"
          ANTHROPIC_API_KEY: "sk-ant-placeholder"
